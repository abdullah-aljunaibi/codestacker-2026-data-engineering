name: Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: airflow
          POSTGRES_PASSWORD: airflow
          POSTGRES_DB: airflow
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U airflow -d airflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
          pip install -r api/requirements.txt
          pip install requests==2.31.0 psycopg2-binary==2.9.9

      - name: Initialize database schema
        env:
          PGPASSWORD: airflow
        run: psql -h localhost -p 5433 -U airflow -d airflow -f sql/init.sql

      - name: Start mock API
        run: |
          python api/app.py &
          sleep 3
          curl -f http://localhost:8000/health

      - name: Run pipeline
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: "5433"
          POSTGRES_DB: airflow
          POSTGRES_USER: airflow
          POSTGRES_PASSWORD: airflow
          API_URL: http://127.0.0.1:8000/api/shipments
          TIERS_CSV_PATH: data/customer_tiers.csv
        run: |
          python scripts/extract_shipments.py
          python scripts/extract_customer_tiers.py
          python scripts/transform_data.py
          python scripts/load_analytics.py

      - name: Run tests
        env:
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: "5433"
          POSTGRES_DB: airflow
          POSTGRES_USER: airflow
          POSTGRES_PASSWORD: airflow
          API_URL: http://127.0.0.1:8000/api/shipments
          TIERS_CSV_PATH: data/customer_tiers.csv
        run: python3 -m pytest tests/ -v
